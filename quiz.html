<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Menu Study</title>
  <link rel="stylesheet" href="style.css">
  <script>sessionStorage.getItem("menuStudy.unlocked")!=="true"&&document.documentElement.classList.add("locked");</script>
</head>
<body>
  <header>
    <a href="index.html" class="back">← Home</a>
    <h1>TEST</h1>
    <h1 class="title-outline">YOURSELF</h1>
    <p id="quiz-score" class="muted" style="margin-top: 1rem;"></p>
  </header>

  <main>
    <div class="quiz-modes">
      <button class="chip chip-active" data-mode="name">Name the Dish</button>
      <button class="chip" data-mode="ingredients">Pick Ingredients</button>
      <button class="chip" data-mode="describe">Describe It</button>
    </div>
    <div class="quiz-categories" id="quiz-categories"></div>

    <div id="quiz-prompt" class="quiz-prompt"></div>
    <div id="quiz-options" class="quiz-options"></div>
    <p id="quiz-feedback"></p>
    <div class="actions">
      <button id="quiz-next" class="btn">Next →</button>
    </div>
  </main>

  <div class="disclaimer">Not affiliated with Jam! On Main</div>

  <script src="app.js"></script>
  <script>initQuiz();</script>
</body>
</html>
