<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards — Menu Study</title>
  <link rel="stylesheet" href="style.css">
  <script>sessionStorage.getItem("menuStudy.unlocked")!=="true"&&document.documentElement.classList.add("locked");</script>
</head>
<body>
  <header>
    <a href="index.html" class="back">← Home</a>
    <h1 class="title-outline">FLIP THE</h1>
    <h1>FLASHCARDS</h1>
    <p id="counter" class="muted" style="margin-top: 1rem;"></p>
  </header>

  <main>
    <label class="toggle">
      <input type="checkbox" id="include-known"> Include items I've marked known
    </label>

    <div id="flashcard" class="flashcard">
      <div class="flashcard-inner">
        <div id="card-front" class="flashcard-face flashcard-front"></div>
        <div id="card-back" class="flashcard-face flashcard-back"></div>
      </div>
    </div>

    <div class="actions">
      <button id="review-again" class="btn btn-ghost">Review again</button>
      <button id="got-it" class="btn">Got it</button>
    </div>
  </main>

  <div class="disclaimer">Not affiliated with Jam! On Main</div>

  <script src="app.js"></script>
  <script>initFlashcards();</script>
</body>
</html>
