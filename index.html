<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAM! Menu Study</title>
  <meta name="description" content="A study tool for memorizing the JAM menu.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <p class="muted">JAM! ON MAIN — STAFF STUDY GUIDE</p>
    <h1>THE BEST WAY</h1>

    <p id="progress" class="muted" style="margin-top: 1rem;">Loading…</p>
    <p id="quiz-stats" class="muted"></p>

  <div class="brand-strip">

  </div>

  <main>
    <nav class="mode-grid">
      <a class="mode-btn" href="browse.html">
        <span class="mode-title">Browse</span>
        <span class="mode-sub">Read through every item</span>
      </a>
      <a class="mode-btn" href="flashcards.html">
        <span class="mode-title">Flashcards</span>
        <span class="mode-sub">Drill names → details</span>
      </a>
      <a class="mode-btn" href="quiz.html">
        <span class="mode-title">Quiz</span>
        <span class="mode-sub">Multiple choice from descriptions</span>
      </a>
    </nav>

    <div class="actions">
      <button id="reset-btn" class="btn btn-ghost">Reset Progress</button>
    </div>
  </main>

  <div class="disclaimer">Not affiliated with Jam! On Main</div>

  <script src="app.js"></script>
  <script>initHome();</script>

</html>
